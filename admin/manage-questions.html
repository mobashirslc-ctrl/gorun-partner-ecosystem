<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question Manager | GORUN Admin</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 40px; }
        .admin-card { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { color: #0f172a; border-bottom: 2px solid #008f51; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 15px; background: #008f51; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add:hover { background: #007542; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>Add New Assessment Question</h2>
    
    <div class="form-group">
        <label>SELECT CATEGORY</label>
        <select id="cat">
            <option value="student_counselor">Student Counselor</option>
            <option value="visa_expert">Visa Documentation Expert</option>
            <option value="compliance_expert">Compliance (Study Abroad)</option>
            <option value="admission_specialist">University Admission Specialist</option>
            <option value="language_trainer">IELTS / English Trainer</option>
            <option value="software_dev">Software Developer</option>
            <option value="data_entry">Data Entry Operator</option>
            <option value="excel_expert">Excel & Data Analyst</option>
            <option value="it_support">IT Support Technician</option>
            <option value="graphics_designer">Graphics Designer</option>
            <option value="sales_marketing">Sales & Marketing</option>
            <option value="call_center">Call Centre Agent</option>
            <option value="digital_marketer">Digital Marketing Expert</option>
            <option value="social_media_manager">Social Media Manager</option>
            <option value="bde_partner_manager">Business Development (B2B)</option>
            <option value="office_admin">Office Administrator</option>
            <option value="accounts_payroll">Accounts & Payroll</option>
            <option value="hr_manager">HR Manager</option>
            <option value="field_officer">Logistics / Field Officer</option>
            <option value="content_writer">Content Writer / SOP Specialist</option>
        </select>
    </div>

    <div class="form-group">
        <label>QUESTION TEXT</label>
        <textarea id="qText" rows="3" placeholder="Enter your question here..."></textarea>
    </div>

    <div class="form-group"><label>OPTION 1</label><input type="text" id="opt1"></div>
    <div class="form-group"><label>OPTION 2</label><input type="text" id="opt2"></div>
    <div class="form-group"><label>OPTION 3</label><input type="text" id="opt3"></div>

    <div class="form-group">
        <label>CORRECT OPTION</label>
        <select id="correctIndex">
            <option value="0">Option 1</option>
            <option value="1">Option 2</option>
            <option value="2">Option 3</option>
        </select>
    </div>

    <button id="addBtn" class="btn-add" onclick="saveQuestion()">Add to Question Pool</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="../config.js"></script> 

<script>
    // Realtime Database রেফারেন্স
    const rdb = firebase.database();

    function saveQuestion() {
        const category = document.getElementById('cat').value; // 'cat' আইডি ব্যবহার করা হয়েছে
        const questionText = document.getElementById('qText').value;
        const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value;
        const o3 = document.getElementById('opt3').value;
        const correct = document.getElementById('correctIndex').value;
        const btn = document.getElementById('addBtn');

        if(!questionText || !o1 || !o2 || !o3) {
            return alert("সবগুলো ঘর পূরণ করুন!");
        }

        btn.disabled = true;
        btn.innerText = "Saving...";

        // Realtime Database এ সেভ করার লজিক
        // পাথ: questions / category_name / unique_id
        const newPostRef = rdb.ref('questions/' + category).push();
        
        newPostRef.set({
            question: questionText,
            options: [o1, o2, o3],
            correct: parseInt(correct),
            createdAt: new Date().toISOString()
        })
        .then(() => {
            alert("Question Added Successfully to Realtime Database!");
            // ফর্ম ক্লিয়ার করা
            document.getElementById('qText').value = "";
            document.getElementById('opt1').value = "";
            document.getElementById('opt2').value = "";
            document.getElementById('opt3').value = "";
            btn.disabled = false;
            btn.innerText = "Add to Question Pool";
        })
        .catch(err => {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "Add to Question Pool";
        });
    }
</script>

</body>
</html>
