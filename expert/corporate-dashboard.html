<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Dashboard | GORUN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --light-bg: #f8fafc; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); display: flex; }
        .sidebar { width: var(--sidebar-width); background: var(--dark-blue); height: 100vh; color: white; padding: 30px 20px; position: fixed; }
        .logo { font-size: 24px; font-weight: 800; color: var(--gorun-green); margin-bottom: 40px; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background: rgba(0, 143, 81, 0.1); color: var(--gorun-green); }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 5px; }
        label { font-size: 14px; font-weight: 600; color: #475569; }
        .btn-primary { background: var(--gorun-green); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">GORUN Corporate</div>
    <ul class="nav-menu">
        <li class="nav-item active" onclick="switchSection('dashboard', this)"><i class="fas fa-home"></i> Overview</li>
        <li class="nav-item" onclick="switchSection('jobs', this)"><i class="fas fa-history"></i> Job History</li>
        <li class="nav-item" onclick="switchSection('staff', this)"><i class="fas fa-users"></i> Active Staff</li>
        <li class="nav-item" onclick="switchSection('qr', this)"><i class="fas fa-qrcode"></i> Office QR</li>
        <li class="nav-item" onclick="switchSection('payments', this)"><i class="fas fa-wallet"></i> Payments</li>
        <li class="nav-item" onclick="logout()" style="margin-top: 20px; color: #f87171;"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h2>Welcome, <span id="company-name">...</span></h2>
        <div style="text-align: right;">
            <div id="wallet-balance" style="font-weight: 700; color: var(--gorun-green);">Balance: ৳ 0.00</div>
            <button onclick="rechargeWallet()" style="font-size: 11px; cursor: pointer; background: none; border: 1px solid #ddd; padding: 2px 8px; border-radius: 5px;">+ Recharge</button>
        </div>
    </div>

    <div id="dashboard-main-view">
        <div class="card">
            <h3><i class="fas fa-briefcase"></i> Post a New Job Request</h3>
            
            <div style="margin: 20px 0;">
                <label>Hiring Type</label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <label style="cursor: pointer;"><input type="radio" name="hiring-type" value="instant" checked onchange="toggleCalendar(false)" style="width: auto;"> Instant Hiring</label>
                    <label style="cursor: pointer;"><input type="radio" name="hiring-type" value="prebook" onchange="toggleCalendar(true)" style="width: auto;"> Pre-booking</label>
                </div>
            </div>

            <div id="prebook-calendar" style="display: none; margin-bottom: 20px;">
                <label>Select Booking Date</label>
                <input type="date" id="booking-date">
            </div>

            <div class="grid-2">
                <div>
                    <label>Expertise Category</label>
                    <select id="job-category">
                        <option value="Counselor">Study Abroad Counselor</option>
                        <option value="IT Expert">IT & Software Expert</option>
                        <option value="Compliance">Compliance Officer</option>
                    </select>
                </div>
                <div>
                    <label>Hourly Rate (৳)</label>
                    <input type="number" id="hourly-rate" value="250">
                    <small>Min: ৳<span id="min-val">200</span></small>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label>Workplace Location</label>
                <div class="grid-2">
                    <input type="text" id="lat" placeholder="Lat" readonly>
                    <input type="text" id="lng" placeholder="Lng" readonly>
                </div>
                <button onclick="getLocation()" style="color: var(--gorun-green); border: none; background: none; cursor: pointer; font-size: 12px; margin-top: 5px;"><i class="fas fa-location-arrow"></i> Get Office GPS</button>
            </div>

            <div style="margin-top: 20px;">
                <label>Core Tasks</label>
                <div id="task-list">
                    <input type="text" class="task-item" placeholder="Task 1: e.g. File Assessment" style="margin-bottom: 10px;">
                </div>
                <button onclick="addTask()" style="font-size: 12px; cursor: pointer;">+ Add Task</button>
            </div>

            <button class="btn-primary" onclick="submitJob()">Publish Job Order</button>
        </div>
    </div>

    <div id="table-container" style="display: none;">
        <div class="card">
            <h3 id="table-title">Section Title</h3>
            <div id="table-content" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Firebase Init
    const firebaseConfig = {
        apiKey: "AIzaSyAZ4On6mrMYp743OPavpxlsYUDrU-B7ozM",
        authDomain: "life-gps-2c6d1.firebaseapp.com",
        projectId: "life-gps-2c6d1",
        storageBucket: "life-gps-2c6d1.firebasestorage.app",
        messagingSenderId: "739534835153",
        appId: "1:739534835153:web:77e6b1f6650fba5d7624f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const currentCorpPhone = localStorage.getItem("loggedCorpPhone");
    const currentCorpName = localStorage.getItem("loggedCorpName");

    if (!currentCorpPhone) { window.location.href = "corporate-login.html"; }
    else { document.getElementById('company-name').innerText = currentCorpName; }

    function toggleCalendar(show) {
        document.getElementById('prebook-calendar').style.display = show ? 'block' : 'none';
    }

    function switchSection(section, element) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        const dashboard = document.getElementById('dashboard-main-view');
        const tableContainer = document.getElementById('table-container');
        const tableTitle = document.getElementById('table-title');
        const tableDiv = document.getElementById('table-content');

        if (section === 'dashboard') {
            dashboard.style.display = 'block';
            tableContainer.style.display = 'none';
        } else {
            dashboard.style.display = 'none';
            tableContainer.style.display = 'block';
            tableTitle.innerText = section.toUpperCase();

            if (section === 'jobs') {
                tableDiv.innerHTML = `<table><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Staff</th><th>Status</th></tr></thead><tbody id="job-list-body"></tbody></table>`;
                loadJobHistory();
            } else if (section === 'staff') {
                tableDiv.innerHTML = `<div id="active-staff-list">Scanning for active staff...</div>`;
                loadActiveStaff();
            } else if (section === 'payments') {
                tableDiv.innerHTML = `<table><thead><tr><th>Date</th><th>Expert</th><th>Amount</th><th>Status</th></tr></thead><tbody id="payment-list-body"></tbody></table>`;
                loadPayments();
            } else if (section === 'qr') {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=GORUN_OFFICE_${currentCorpPhone}`;
                tableDiv.innerHTML = `<div style="text-align:center"><img src="${qrUrl}"><br><p>Office Check-in QR</p></div>`;
            }
        }
    }

    function loadJobHistory() {
        db.collection("jobs").where("clientId", "==", currentCorpPhone).orderBy("createdAt", "desc").get().then(snapshot => {
            const body = document.getElementById('job-list-body');
            body.innerHTML = snapshot.empty ? "<tr><td colspan='5'>No jobs found.</td></tr>" : "";
            snapshot.forEach(doc => {
                const data = doc.data();
                body.innerHTML += `<tr>
                    <td>${data.createdAt ? data.createdAt.toDate().toLocaleDateString() : 'N/A'}</td>
                    <td>${data.hiringType}</td>
                    <td>${data.category}</td>
                    <td>${data.staffName || 'Searching...'}</td>
                    <td><span class="status-badge" style="background:#eee">${data.status}</span></td>
                </tr>`;
            });
        });
    }

    function loadActiveStaff() {
        db.collection("jobs").where("clientId", "==", currentCorpPhone).where("status", "==", "ongoing").onSnapshot(snapshot => {
            const div = document.getElementById('active-staff-list');
            div.innerHTML = snapshot.empty ? "No staff currently working." : "";
            snapshot.forEach(doc => {
                const job = doc.data();
                div.innerHTML += `<div class="card" style="border:1px solid #eee">
                    <strong>${job.staffName}</strong> - ${job.category}<br>
                    <small>Started: ${job.createdAt.toDate().toLocaleTimeString()}</small>
                </div>`;
            });
        });
    }

    function loadPayments() {
        db.collection("invoices").where("corporatePhone", "==", currentCorpPhone).get().then(snapshot => {
            const body = document.getElementById('payment-list-body');
            body.innerHTML = snapshot.empty ? "<tr><td colspan='4'>No payment history.</td></tr>" : "";
            snapshot.forEach(doc => {
                const inv = doc.data();
                body.innerHTML += `<tr>
                    <td>${inv.createdAt ? inv.createdAt.toDate().toLocaleDateString() : '...'}</td>
                    <td>${inv.staffName}</td>
                    <td>৳ ${inv.totalBill}</td>
                    <td style="color:green">Paid</td>
                </tr>`;
            });
        });
    }
    function rechargeWallet() {
    const amt = prompt("Enter amount to recharge (৳):");
    if (!amt || isNaN(amt) || amt <= 0) return alert("Invalid amount!");

    const trxId = prompt("Enter your Bkash/Nagad Transaction ID:");
    if (!trxId) return alert("Transaction ID is required for verification!");

    // সরাসরি ওয়ালেট আপডেট না করে 'deposit_requests' এ ডাটা পাঠানো
    db.collection("deposit_requests").add({
        corporatePhone: currentCorpPhone,
        corporateName: currentCorpName,
        amount: parseInt(amt),
        transactionId: trxId,
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        alert("Deposit request submitted! Wait for admin approval.");
    }).catch(err => {
        alert("Error: " + err.message);
    });
}

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lng').value = pos.coords.longitude;
            });
        }
    }

    function submitJob() {
        const hiringType = document.querySelector('input[name="hiring-type"]:checked').value;
        const date = document.getElementById('booking-date').value;
        const rate = document.getElementById('hourly-rate').value;
        const lat = document.getElementById('lat').value;

        if(!lat) return alert("Please get office location first!");
        
        db.collection("jobs").add({
            clientId: currentCorpPhone,
            clientName: currentCorpName,
            hiringType: hiringType,
            scheduledDate: hiringType === 'prebook' ? date : 'Instant',
            category: document.getElementById('job-category').value,
            hourlyRate: parseInt(rate),
            geo: { lat: parseFloat(lat), lng: parseFloat(document.getElementById('lng').value) },
            status: "open",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => { alert("Job Published!"); location.reload(); });
    }

    function addTask() {
        const input = document.createElement('input');
        input.className = 'task-item';
        input.placeholder = "Next Task...";
        input.style = "width:100%; padding:12px; margin-bottom:10px; border:1px solid #e2e8f0; border-radius:10px;";
        document.getElementById('task-list').appendChild(input);
    }

    function logout() { localStorage.clear(); window.location.href = "corporate-login.html"; }

    db.collection("corporates").doc(currentCorpPhone).onSnapshot(doc => {
        if(doc.exists) document.getElementById('wallet-balance').innerText = `Balance: ৳ ${doc.data().walletBalance || 0}`;
    });
</script>
</body>
</html>
