<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Dashboard | GORUN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --light-bg: #f8fafc; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); display: flex; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--dark-blue); height: 100vh; color: white; padding: 30px 20px; position: fixed; }
        .logo { font-size: 24px; font-weight: 800; color: var(--gorun-green); margin-bottom: 40px; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background: rgba(0, 143, 81, 0.1); color: var(--gorun-green); }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 5px; }
        label { font-size: 14px; font-weight: 600; color: #475569; }
        
        .btn-primary { background: var(--gorun-green); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-approve { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-ongoing { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">GORUN Corporate</div>
    <ul class="nav-menu">
        <li class="nav-item active" onclick="switchSection('dashboard', this)"><i class="fas fa-home"></i> Overview</li>
        <li class="nav-item" onclick="switchSection('jobs', this)"><i class="fas fa-plus-circle"></i> Place Job</li>
        <li class="nav-item" onclick="switchSection('staff', this)"><i class="fas fa-users"></i> Active Staff</li>
        <li class="nav-item" onclick="switchSection('qr', this)"><i class="fas fa-qrcode"></i> Office QR</li>
        <li class="nav-item" onclick="switchSection('payments', this)"><i class="fas fa-file-invoice-dollar"></i> Payments</li>
        <li class="nav-item" onclick="logout()" style="margin-top: 20px; color: #f87171;"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h2>Welcome, <span id="company-name">...</span></h2>
        <div style="text-align: right;">
            <div id="wallet-balance" style="font-weight: 700; color: var(--gorun-green);">Balance: ৳ 0.00</div>
            <button onclick="rechargeWallet()" style="font-size: 11px; cursor: pointer;">+ Recharge Wallet</button>
        </div>
    </div>

    <div id="dashboard-main-view">
        <div class="card">
            <h3><i class="fas fa-briefcase"></i> Post a New Job Request</h3>
            <div class="grid-2" style="margin-top: 20px;">
                <div>
                    <label>Required Expert Expertise</label>
                    <select id="job-category">
                        <option value="counselor">Study Abroad Counselor</option>
                        <option value="it_expert">IT & Software Expert</option>
                        <option value="compliance">Compliance Officer</option>
                    </select>
                </div>
                <div>
                    <label>Hourly Payment (৳)</label>
                    <input type="number" id="hourly-rate" placeholder="e.g. 250">
                    <small style="color: #64748b;">Min rate: ৳<span id="min-val">200</span></small>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label>Office Location</label>
                <div class="grid-2">
                    <input type="text" id="lat" placeholder="Latitude" readonly>
                    <input type="text" id="lng" placeholder="Longitude" readonly>
                </div>
                <button onclick="getLocation()" style="font-size: 12px; background: none; border: none; color: var(--gorun-green); cursor: pointer; margin-top: 5px;">
                    <i class="fas fa-location-dot"></i> Get Current Office Location
                </button>
            </div>

            <div style="margin-top: 20px;">
                <label>Core Tasks</label>
                <div id="task-list">
                    <input type="text" class="task-item" placeholder="Task 1: e.g. Student Interview" style="margin-bottom: 10px;">
                </div>
                <button onclick="addTask()" style="background: #f1f5f9; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">+ Add More Task</button>
            </div>

            <button class="btn-primary" onclick="submitJob()">Publish Job Order</button>
        </div>
    </div>

    <div id="table-container" style="display: none;">
        <div class="card">
            <h3 id="table-title">Section Title</h3>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #f1f5f9;">
            <div id="table-content">
                </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    const currentCorpPhone = localStorage.getItem("loggedCorpPhone");
    const currentCorpName = localStorage.getItem("loggedCorpName");

    if (!currentCorpPhone) { window.location.href = "corporate-login.html"; } 
    else { document.getElementById('company-name').innerText = currentCorpName; }

    const firebaseConfig = {
        apiKey: "AIzaSyAZ4On6mrMYp743OPavpxlsYUDrU-B7ozM",
        authDomain: "life-gps-2c6d1.firebaseapp.com",
        projectId: "life-gps-2c6d1",
        storageBucket: "life-gps-2c6d1.firebasestorage.app",
        messagingSenderId: "739534835153",
        appId: "1:739534835153:web:77e6b1f6650fba5d7624f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- ১. সাইডবার সুইচিং লজিক (FIXED) ---
    function switchSection(section, element) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');

        const dashboard = document.getElementById('dashboard-main-view'); 
        const tableContainer = document.getElementById('table-container'); 
        const tableTitle = document.getElementById('table-title');
        const tableDiv = document.getElementById('table-content');

        if (section === 'dashboard') {
            dashboard.style.display = 'block';
            tableContainer.style.display = 'none';
        } 
        else {
            dashboard.style.display = 'none';
            tableContainer.style.display = 'block';
            tableTitle.innerText = section.toUpperCase();

            if (section === 'qr') {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=GORUN_CHECKIN_${currentCorpPhone}`;
                tableDiv.innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <img src="${qrUrl}" style="border:10px solid #f1f5f9; border-radius:15px;">
                        <h3>Scan to Check-in</h3>
                        <button onclick="window.print()" class="btn-primary" style="width:200px">Print QR</button>
                    </div>`;
            } else if (section === 'staff') {
                tableDiv.innerHTML = `<div id="active-jobs-container">Loading active staff...</div>`;
                initStaffMonitoring(); // স্টাব মনিটরিং শুরু
            } else if (section === 'payments') {
                tableDiv.innerHTML = `
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr style="text-align:left; border-bottom:1px solid #eee;">
                            <th>Date</th><th>Staff</th><th>Amount</th><th>Action</th>
                        </tr></thead>
                        <tbody id="transaction-history"></tbody>
                    </table>`;
            }
        }
    }

    // --- ২. ওয়ালেট রিচার্জ ---
    function rechargeWallet() {
        const amt = prompt("Enter amount (৳):");
        if(amt && !isNaN(amt)) {
            db.collection("corporates").doc(currentCorpPhone).update({
                walletBalance: firebase.firestore.FieldValue.increment(parseInt(amt))
            }).then(() => alert("Wallet Updated!"));
        }
    }

    // --- ৩. লোকেশন লজিক ---
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lng').value = pos.coords.longitude;
            });
        }
    }

    // --- ৪. জব পাবলিশ ---
    function submitJob() {
        const rate = document.getElementById('hourly-rate').value;
        const lat = document.getElementById('lat').value;
        if(!lat) return alert("Please get office location first!");
        
        const tasks = Array.from(document.querySelectorAll('.task-item')).map(i => ({title: i.value, completed: false})).filter(t => t.title != "");

        db.collection("jobs").add({
            clientId: currentCorpPhone,
            clientName: currentCorpName,
            category: document.getElementById('job-category').value,
            hourlyRate: parseInt(rate),
            geo: { lat: parseFloat(lat), lng: parseFloat(document.getElementById('lng').value) },
            tasks: tasks,
            status: "open",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => { alert("Job Published!"); location.reload(); });
    }

    function addTask() {
        const input = document.createElement('input');
        input.className = 'task-item';
        input.placeholder = "Next Task...";
        input.style = "width:100%; padding:12px; margin-bottom:10px; border:1px solid #e2e8f0; border-radius:10px;";
        document.getElementById('task-list').appendChild(input);
    }

    function logout() { localStorage.clear(); window.location.href = "corporate-login.html"; }

    // ব্যালেন্স রিয়েল-টাইম আপডেট
    db.collection("corporates").doc(currentCorpPhone).onSnapshot(doc => {
        if(doc.exists) document.getElementById('wallet-balance').innerText = `Balance: ৳ ${doc.data().walletBalance || 0}`;
    });
</script>
</body>
</html>
