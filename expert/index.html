<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Gateway | GORUN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark: #0f172a; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .gateway-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-size: 32px; font-weight: 900; color: var(--gorun-green); margin-bottom: 20px; }
        .btn-box { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .main-btn { display: flex; align-items: center; padding: 20px; background: #fff; border: 2px solid #f1f5f9; border-radius: 18px; text-decoration: none; color: var(--dark); font-weight: 700; transition: 0.3s; }
        .main-btn:hover { border-color: var(--gorun-green); transform: translateY(-3px); }
        .main-btn i { margin-right: 15px; color: var(--gorun-green); font-size: 20px; }
    </style>
</head>
<body>
    <div class="gateway-card">
        <div class="logo">GORUN</div>
        <h3>Select Portal</h3>
        <div class="btn-box">
            <a href="staff-entry.html" class="main-btn">
                <i class="fas fa-user-tie"></i> Join as Staff
            </a>
            <a href="corporate-entry.html" class="main-btn">
                <i class="fas fa-building"></i> Join as Corporate
            </a>
        </div>
    </div>
</body>
</html>
