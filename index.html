<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="CSS/style.css"> <style>
        /* নীরময় স্টাইল - স্প্লিট স্ক্রিন */
        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* বাম পাশ - ব্যানার ডিজাইন */
        .brand-side {
            flex: 1.1; /* নীরময়ের মতো বাম পাশ বড় */
            position: relative;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* আপনার ছবির গ্রিন টোনের সাথে মিলিয়ে ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, #f0fff4 0%, #e6fffa 100%);
        }

        .brand-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ছবি পুরা জায়গায় সেট হবে */
        }

        /* ডান পাশ - ফর্ম */
        .form-side {
            flex: 0.9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            background-color: #ffffff;
        }
        
        /* ... existing content-box styles ... */

        @media (max-width: 992px) {
            .brand-side { display: none; } /* মোবাইলে ব্যানার হাইড */
            .form-side { flex: 1; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-side">
        <img src="assets/img/banner.jpg" alt="GORUN Banner">
    </div>

    <div class="form-side">
        <div class="content-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="assets/img/logo.png" alt="GORUN" style="width: 120px;" 
                     onerror="this.src='logo.png'">
            </div>
            
            <div class="header">
                <h2 id="form-title">Join GORUN</h2>
                <p id="form-desc">Create your partner account to access the B2B ecosystem.</p>
            </div>
            </div>
    </div>
</div>

</body>
</html>
