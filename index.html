<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN | Partner Portal</title>
    <style>
        /* লোগোর গ্রিন কালার কোড */
        :root { 
            --gorun-green: #008f51; 
            --dark-green: #004d2c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            /* লোগোর গ্রিন শেড অনুযায়ী ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, var(--gorun-green) 0%, var(--dark-green) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); /* Glassmorphism ইফেক্ট */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }

        /* বাম পাশ: বর্ডারড ডিজাইন বক্স */
        .left-banner {
            flex: 1.1;
            padding: 30px;
            display: flex;
            align-items: center;
        }
        .image-border-box {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        .image-border-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* ডান পাশ: সাদা রেজিস্ট্রেশন বক্স */
        .right-form {
            flex: 0.9;
            background: #ffffff;
            padding: 50px;
            display: flex;
            flex-direction: column;
        }

        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box img { width: 90px; }
        .logo-box h1 { 
            color: var(--gorun-green); 
            font-size: 28px; 
            font-weight: 900; 
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .form-content { overflow-y: auto; max-height: 550px; padding-right: 15px; }
        
        /* ইনপুট স্টাইল */
        .input-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-group { flex: 1; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; color: #334155; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            background: #f8fafc;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--gorun-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: var(--dark-green); transform: translateY(-2px); }

        .legal-footer {
            margin-top: auto;
            padding-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
        }

        /* মোবাইলের জন্য রেসপন্সিভ */
        @media (max-width: 992px) {
            .left-banner { display: none; }
            .main-container { max-width: 500px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-banner">
        <div class="image-border-box">
            <img src="assets/img/banner.jpg" alt="GORUN B2B Banner">
        </div>
    </div>

    <div class="right-form">
        <div class="logo-box">
            <img src="assets/img/logo.png" alt="GORUN Logo">
            <h1>GORUN</h1>
        </div>

        <div class="form-content">
            <form>
                <div class="input-group">
                    <label>Merchant Name *</label>
                    <input type="text" placeholder="Enter Business Name" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Contact No *</label>
                        <input type="tel" placeholder="017XXXXXXXX" required>
                    </div>
                    <div class="input-group">
                        <label>Merchant Type *</label>
                        <select required>
                            <option value="">Choose Category</option>
                            <option>Groceries</option>
                            <option>Pharmacy</option>
                            <option>Food</option>
                            <option>Fashion</option>
                            <option>Electronics</option>
                            <option>Corporate</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Address *</label>
                    <input type="text" placeholder="Full Office/Shop Address" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Password *</label>
                        <input type="password" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password *</label>
                        <input type="password" required>
                    </div>
                </div>

                <div style="font-size: 12px; color: #64748b; display: flex; gap: 10px; margin: 10px 0;">
                    <input type="checkbox" required>
                    <span>I agree to the <a href="#" style="color:var(--gorun-green)">Terms</a> and <a href="#" style="color:var(--gorun-green)">Privacy Policy</a>.</span>
                </div>

                <button type="submit" class="btn-submit">Register as Partner</button>
            </form>
        </div>

        <div class="legal-footer">
            <span>© 2026 GORUN Limited</span>
            <div>
                <a href="#" style="color:#94a3b8; text-decoration:none; margin-left:10px;">Terms</a>
                <a href="#" style="color:#94a3b8; text-decoration:none; margin-left:10px;">Privacy</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
