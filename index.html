<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN | Partner Portal</title>
    <style>
        :root { --main-green: #008f51; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            /* পুরো পেজ গ্রিন ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, #008f51 0%, #004d2c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wrapper {
            display: flex;
            width: 100%;
            max-width: 1150px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* Glassmorphism ইফেক্ট */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Left Side: Design Section with Border */
        .brand-side {
            flex: 1;
            padding: 40px;
            display: flex;
            align-items: center;
        }
        .bordered-design {
            width: 100%;
            height: 550px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }
        .bordered-design img { width: 100%; height: 100%; object-fit: cover; }

        /* Right Side: White Registration Box */
        .form-side {
            flex: 1;
            background: #ffffff;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-area img { width: 80px; margin-bottom: 5px; }
        .logo-area h1 { color: var(--main-green); font-size: 26px; font-weight: 800; }

        .form-container { overflow-y: auto; max-height: 500px; padding-right: 10px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #555; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--main-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #007341; }

        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .brand-side { display: none; }
            .wrapper { max-width: 500px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-side">
        <div class="bordered-design">
            <img src="assets/img/banner.jpg" alt="Partner Banner">
        </div>
    </div>

    <div class="form-side">
        <div class="logo-area">
            <img src="assets/img/logo.png" alt="GORUN Logo">
            <h1>GORUN</h1>
        </div>

        <div class="form-container">
            <form>
                <div class="input-group">
                    <label>Merchant Name *</label>
                    <input type="text" placeholder="e.g. Gorun Limited" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Contact No *</label>
                        <input type="tel" placeholder="01XXX-XXXXXX" required>
                    </div>
                    <div class="input-group">
                        <label>Merchant Type *</label>
                        <select required>
                            <option value="">Select Type</option>
                            <option>Groceries</option>
                            <option>Pharmacy</option>
                            <option>Food</option>
                            <option>Fashion</option>
                            <option>Electronics</option>
                            <option>Corporate</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Address *</label>
                    <input type="text" placeholder="Full Business Address" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Create Password *</label>
                        <input type="password" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password *</label>
                        <input type="password" required>
                    </div>
                </div>

                <div style="font-size: 12px; color: #666; display: flex; gap: 10px; align-items: flex-start; margin: 15px 0;">
                    <input type="checkbox" required style="margin-top: 3px;">
                    <span>I agree to the <a href="#" style="color:var(--main-green)">Terms & Conditions</a> and <a href="#" style="color:var(--main-green)">Privacy Policy</a>.</span>
                </div>

                <button type="submit" class="submit-btn">Be a Partner</button>
            </form>
        </div>

        <div class="footer-links">
            <span>© 2026 GORUN</span>
            <div><a href="#" style="color:#999; text-decoration:none;">Privacy</a> | <a href="#" style="color:#999; text-decoration:none;">Terms</a></div>
        </div>
    </div>
</div>

</body>
</html>
