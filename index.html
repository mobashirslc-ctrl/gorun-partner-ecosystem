<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN | Merchant Portal</title>
    <style>
        :root { 
            --gorun-green: #008f51; 
            --dark-shade: #004d2c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            /* লোগোর গ্রিন শেড অনুযায়ী ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, var(--gorun-green) 0%, var(--dark-shade) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }

        /* বাম পাশ: ডিজাইন বক্স */
        .left-side {
            flex: 1.1;
            padding: 30px;
            display: flex;
            align-items: center;
        }
        .design-border {
            width: 100%;
            height: 100%;
            min-height: 550px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        .design-border img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* ডান পাশ: ফর্ম বক্স */
        .right-side {
            flex: 0.9;
            background: #ffffff;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
        }

        .brand-header { text-align: center; margin-bottom: 25px; }
        .brand-header img { width: 85px; }
        .brand-header h1 { 
            color: var(--gorun-green); 
            font-size: 28px; 
            font-weight: 900; 
            margin-top: 5px;
        }

        .scrollable-form { overflow-y: auto; max-height: 520px; padding-right: 15px; }
        
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-box { flex: 1; margin-bottom: 15px; }
        .input-box label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: #334155; }
        .input-box input, .input-box select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: #fbfcfe;
        }

        .reg-btn {
            width: 100%;
            padding: 15px;
            background: var(--gorun-green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .reg-btn:hover { background: var(--dark-shade); }

        .switch-page {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .switch-page a {
            color: var(--gorun-green);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-nav {
            margin-top: auto;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #94a3b8;
        }

        @media (max-width: 992px) {
            .left-side { display: none; }
            .main-wrapper { max-width: 500px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-side">
        <div class="design-border">
            <img src="assets/img/gorun thambile 345-01.jpg" alt="GORUN Merchant Banner">
        </div>
    </div>

    <div class="right-side">
        <div class="brand-header">
            <img src="assets/img/logo.png" alt="GORUN Logo">
            <h1>GORUN</h1>
        </div>

        <div class="scrollable-form">
            <form>
                <div class="input-box">
                    <label>Merchant Name *</label>
                    <input type="text" placeholder="Your Shop/Business Name" required>
                </div>

                <div class="input-row">
                    <div class="input-box">
                        <label>Contact No *</label>
                        <input type="tel" placeholder="01XXXXXXXXX" required>
                    </div>
                    <div class="input-box">
                        <label>Merchant Type *</label>
                        <select required>
                            <option value="">Select Category</option>
                            <option>Groceries</option>
                            <option>Pharmacy</option>
                            <option>Food</option>
                            <option>Fashion</option>
                            <option>Electronics</option>
                            <option>Corporate</option>
                        </select>
                    </div>
                </div>

                <div class="input-box">
                    <label>Business Address *</label>
                    <input type="text" placeholder="Full Address" required>
                </div>

                <div class="input-row">
                    <div class="input-box">
                        <label>Password *</label>
                        <input type="password" required>
                    </div>
                    <div class="input-box">
                        <label>Confirm Password *</label>
                        <input type="password" required>
                    </div>
                </div>

                <div style="font-size: 12px; color: #64748b; display: flex; gap: 8px; margin-bottom: 20px;">
                    <input type="checkbox" required>
                    <span>I agree to GORUN's <a href="#" style="color:var(--gorun-green)">Terms</a> & <a href="#" style="color:var(--gorun-green)">Privacy Policy</a>.</span>
                </div>

                <button type="submit" class="reg-btn">Create Partner Account</button>
            </form>

            <div class="switch-page">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>

        <div class="footer-nav">
            <span>© 2026 GORUN Limited</span>
            <div>
                <a href="#" style="color:#94a3b8; text-decoration:none; margin-left:10px;">Terms</a>
                <a href="#" style="color:#94a3b8; text-decoration:none; margin-left:10px;">Privacy</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
