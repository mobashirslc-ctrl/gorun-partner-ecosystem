<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN | Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        .wrapper { display: flex; min-height: 100vh; background-color: #fff; }

        /* Left side Banner */
        .brand-side {
            flex: 1.2;
            background-color: #f0fdf4; /* Light green tint */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .brand-side img {
            width: 100%;
            max-width: 600px;
            border-radius: 30px;
            object-fit: cover;
        }

        /* Right side Form */
        .form-side {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            padding: 60px;
            position: relative;
        }

        .logo-top { text-align: right; margin-bottom: 40px; }
        .logo-top img { width: 150px; }

        .form-container { width: 100%; max-width: 400px; margin: 0 auto; }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { font-size: 24px; color: #334155; }
        .form-header h2 span { color: #008f51; font-weight: 700; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #008f51; /* GORUN Green */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .footer-links {
            position: absolute;
            bottom: 20px;
            width: calc(100% - 120px);
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
        }
        .footer-links a { color: #008f51; text-decoration: none; margin-left: 10px; }

        @media (max-width: 1024px) {
            .brand-side { display: none; }
            .form-side { flex: 1; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="brand-side">
        <img src="assets/img/banner.jpg" alt="GORUN Banner">
    </div>

    <div class="form-side">
        <div class="logo-top">
            <img src="assets/img/logo.png" alt="GORUN">
        </div>

        <div class="form-container">
            <div class="form-header">
                <h2>Create <span>partner</span> account</h2>
            </div>

            <form>
                <div class="input-group">
                    <label>Business Name *</label>
                    <input type="text" placeholder="Shop Name" required>
                </div>
                <div class="input-group">
                    <label>Phone Number *</label>
                    <input type="tel" placeholder="01XXX-XXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Password *</label>
                    <input type="password" placeholder="Min. 8 characters" required>
                </div>
                <button type="submit" class="submit-btn">Be a partner</button>
            </form>
        </div>

        <div class="footer-links">
            <span>© 2026 GORUN | All rights reserved</span>
            <div>
                <a href="#">Term & Condition</a> | <a href="#">Privacy & Policy</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
