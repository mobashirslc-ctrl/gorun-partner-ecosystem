<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN - Business Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --green: #22c55e; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        .logo-box img { width: 120px; margin-bottom: 15px; }
        h2 { color: var(--dark); margin-bottom: 20px; font-weight: 800; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; }
        input:focus { border-color: var(--green); outline: none; }
        button { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <img src="logo.png" alt="GORUN LOGO">
    </div>
    <h2>Join GORUN</h2>
    <form id="regForm">
        <input type="text" id="shopName" placeholder="Shop/Business Name" required>
        <input type="tel" id="mobile" placeholder="Mobile Number" required>
        <select id="category" required>
            <option value="" disabled selected>Select Business Category</option>
            <option value="Pharmacy">Pharmacy</option>
            <option value="Groceries">Groceries</option>
            <option value="Fashion">Fashion</option>
            <option value="Food">Food / Cafe</option>
            <option value="Corporate">Corporate Office (Staffing)</option>
        </select>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Get Started</button>
    </form>
</div>

<script src="config.js"></script>
<script>
    document.getElementById('regForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const mobile = document.getElementById('mobile').value;
        const data = {
            shopName: document.getElementById('shopName').value,
            mobile: mobile,
            category: document.getElementById('category').value,
            password: document.getElementById('password').value,
            status: "active"
        };
        db.ref('gorun_merchants/' + mobile).set(data).then(() => {
            localStorage.setItem('gorun_user', mobile);
            window.location.href = "merchant/dashboard.html";
        });
    });
</script>
</body>
</html>
