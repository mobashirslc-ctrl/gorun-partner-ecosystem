<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORUN | Partner Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gorun-green: #008f51; --dark-shade: #004d2c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--gorun-green) 0%, var(--dark-shade) 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .main-wrapper {
            display: flex; width: 100%; max-width: 1100px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.3);
        }
        .left-side { flex: 1.1; padding: 30px; display: flex; align-items: center; }
        .design-border { width: 100%; height: 500px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 20px; overflow: hidden; }
        .design-border img { width: 100%; height: 100%; object-fit: cover; }
        .right-side { flex: 0.9; background: #ffffff; padding: 40px; display: flex; flex-direction: column; }
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header img { width: 80px; }
        .brand-header h1 { color: var(--gorun-green); font-size: 26px; font-weight: 900; }
        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 700; color: #334155; }
        .input-box input, .input-box select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .reg-btn { width: 100%; padding: 15px; background: var(--gorun-green); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        @media (max-width: 900px) { .left-side { display: none; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-side">
        <div class="design-border">
            <img src="assets/img/gorun thambile 345-01.jpg" alt="GORUN Banner">
        </div>
    </div>

    <div class="right-side">
        <div class="brand-header">
            <img src="assets/img/logo.png" alt="GORUN Logo">
            <h1>GORUN</h1>
        </div>

        <form id="regForm">
            <div class="input-box">
                <label>Shop Name *</label>
                <input type="text" id="shopName" placeholder="Enter Shop Name" required>
            </div>
            <div class="input-box">
                <label>Contact No (Username) *</label>
                <input type="tel" id="phone" placeholder="017XXXXXXXX" required>
            </div>
            <div class="input-box">
                <label>Merchant Type *</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Groceries">Groceries</option>
                    <option value="Pharmacy">Pharmacy</option>
                    <option value="Corporate">Corporate</option>
                </select>
            </div>
            <div class="input-box">
                <label>Password *</label>
                <input type="password" id="pass" required>
            </div>
            <button type="submit" class="reg-btn">Create Partner Account</button>
        </form>
    </div>
</div>

<script src="config.js"></script>
<script>
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const phone = document.getElementById('phone').value;
        const data = {
            shopName: document.getElementById('shopName').value,
            category: document.getElementById('category').value,
            pass: document.getElementById('pass').value
        };

        // Firebase-এ ডাটা সেভ করা
        db.ref('gorun_merchants/' + phone).set(data).then(() => {
            localStorage.setItem('gorun_user', phone);
            window.location.href = "dashboard/index.html"; // ড্যাশবোর্ড পাথে নিয়ে যাবে
        });
    };
</script>
</body>
</html>
