<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create GORUN Account</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8fafc; }

        .wrapper { display: flex; min-height: 100vh; }

        /* Left side - Banner */
        .brand-side {
            flex: 1.1;
            background-color: #e2eff1; /* Neeramoy inspired light blue-grey */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .brand-side img {
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            /* বক্স শ্যাডো সরিয়ে একদম ক্লিন রাখা হয়েছে যেমনটা নীরময়ে আছে */
        }

        /* Right side - Form */
        .form-side {
            flex: 0.9;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 60px;
            position: relative;
        }

        .logo-container { text-align: right; margin-bottom: 60px; }
        .logo-container img { width: 140px; }

        .form-container { width: 100%; max-width: 420px; margin: 0 auto; }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-header h2 { font-size: 24px; color: #334155; }
        .form-header h2 span { color: #008f51; font-weight: 700; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569; }
        .form-group label span { color: red; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus { border-color: #008f51; }

        /* Checkbox section from Neeramoy */
        .terms-section {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 25px;
            font-size: 13px;
            color: #64748b;
        }
        .terms-section input { width: 18px; height: 18px; margin-top: 2px; }
        .terms-section a { color: #008f51; text-decoration: none; font-weight: 500; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #8bb4af; /* Neeramoy primary button color */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #008f51; }

        .footer-links {
            position: absolute;
            bottom: 20px;
            right: 40px;
            left: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
        }
        .footer-links div a { color: #64748b; text-decoration: none; margin-left: 10px; }

        @media (max-width: 1024px) {
            .brand-side { display: none; }
            .form-side { flex: 1; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="brand-side">
            <img src="assets/img/banner.jpg" alt="GORUN B2B">
        </div>

        <div class="form-side">
            <div class="logo-container">
                <img src="assets/img/logo.png" alt="GORUN">
            </div>

            <div class="form-container">
                <div class="form-header">
                    <h2>Create <span>partner</span> account</h2>
                </div>

                <form id="registrationForm">
                    <div class="form-group">
                        <label>Business Name <span>*</span></label>
                        <input type="text" placeholder="Enter your shop name" required>
                    </div>

                    <div class="form-group">
                        <label>Phone number <span>*</span></label>
                        <input type="tel" placeholder="01XXX-XXXXXX" required>
                    </div>

                    <div class="form-group">
                        <label>Category <span>*</span></label>
                        <select required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="retail">Retail Partner</option>
                            <option value="agent">Strategic Agent</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Password <span>*</span></label>
                        <input type="password" placeholder="Min. 8 characters" required>
                    </div>

                    <div class="terms-section">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            By continuing, I agree to GORUN Digital Services 
                            <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Be a partner</button>
                    
                    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #64748b;">
                        Already have an account? <a href="#" style="color: #1e293b; font-weight: 600; text-decoration: none;">Sign in</a>
                    </p>
                </form>
            </div>

            <div class="footer-links">
                <span>© 2026 GORUN | All rights reserved</span>
                <div>
                    <a href="#">Term & Condition</a> | <a href="#">Privacy & Policy</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
