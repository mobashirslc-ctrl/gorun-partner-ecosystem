<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Onboarding | GORUN</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .reg-container { background: white; width: 100%; max-width: 800px; padding: 50px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header img { width: 55px; margin-bottom: 15px; }
        .header h2 { color: var(--dark-blue); font-size: 30px; font-weight: 800; }
        .header p { color: #64748b; margin-top: 8px; font-weight: 500; }

        .form-section { margin-bottom: 35px; }
        .section-title { font-size: 13px; color: var(--gorun-green); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--dark-blue); margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px 18px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; background: #fcfdfe; transition: 0.3s; color: #334155; }
        input:focus { border-color: var(--gorun-green); outline: none; box-shadow: 0 0 0 4px rgba(0,143,81,0.1); background: white; }

        /* Category Items like Partner Design */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; background: #f8fafc; padding: 12px 15px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .check-item:hover { border-color: var(--gorun-green); }
        .check-item input { width: auto; margin-right: 12px; accent-color: var(--gorun-green); }
        .check-item span { font-size: 14px; font-weight: 600; color: #475569; }

        .btn-submit { width: 100%; background: var(--gorun-green); color: white; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,143,81,0.2); }
        .btn-submit:hover { background: #007a45; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,143,81,0.3); }

        @media (max-width: 600px) { .reg-container { padding: 30px 20px; } }
    </style>
</head>
<body>

<div class="reg-container" id="regMain">
    <div class="header">
        <img src="../assets/img/logo.png" alt="GORUN">
        <h2>Staff Onboarding</h2>
        <p>Become a Qualified GORUN Expert</p>
    </div>

    <form id="staffRegForm">
        <div class="form-section">
            <span class="section-title">Personal Details</span>
            <div class="input-grid">
                <div class="input-group"><label>Full Name</label><input type="text" id="staffName" placeholder="e.g. Mr. Mobashir" required></div>
                <div class="input-group"><label>Phone Number</label><input type="tel" id="staffPhone" placeholder="017XXXXXXXX" required></div>
                <div class="input-group"><label>NID Number</label><input type="number" id="staffNID" placeholder="National ID Number" required></div>
                <div class="input-group"><label>Password</label><input type="password" id="staffPass" placeholder="Set a strong password" required></div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">Professional Expertise</span>
            <label>Work Categories (Select all that apply)</label>
            <div class="category-grid">
                <label class="check-item"><input type="checkbox" name="workCat" value="Corporate"> <span>Corporate</span></label>
                <label class="check-item"><input type="checkbox" name="workCat" value="Medicine"> <span>Medicine</span></label>
                <label class="check-item"><input type="checkbox" name="workCat" value="Groceries"> <span>Groceries</span></label>
                <label class="check-item"><input type="checkbox" name="workCat" value="Food"> <span>Food & Service</span></label>
                <label class="check-item"><input type="checkbox" name="workCat" value="Fashion"> <span>Fashion</span></label>
                <label class="check-item"><input type="checkbox" name="workCat" value="Electronic"> <span>Electronics</span></label>
            </div>

            <div class="input-grid" style="margin-top: 25px;">
                <div class="input-group"><label>Hourly Rate (৳)</label><input type="number" id="hourlyRate" placeholder="e.g. 300" required></div>
                <div class="input-group">
                    <label>Experience Level</label>
                    <select id="experience" required>
                        <option value="0-1">Junior (0-1 Year)</option>
                        <option value="2-5">Mid-Level (2-5 Years)</option>
                        <option value="5+">Senior (5+ Years)</option>
                    </select>
                </div>
                <div class="input-group"><label>Key Skills</label><input type="text" id="keySkills" placeholder="e.g. Excel, Hardware, Management"></div>
                <div class="input-group"><label>Education</label><input type="text" id="education" placeholder="e.g. BBA / Diploma"></div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">Verification & Links</span>
            <div class="input-group">
                <label>Portfolio / CV Link (Google Drive)</label>
                <input type="url" id="cvLink" placeholder="https://drive.google.com/your-cv">
            </div>
        </div>

        <button type="submit" class="btn-submit">Complete Registration</button>
    </form>
</div>

<script src="../config.js"></script>
<script>
    document.getElementById('staffRegForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const selectedCats = [];
        document.querySelectorAll('input[name="workCat"]:checked').forEach(c => selectedCats.push(c.value));
        if(selectedCats.length === 0) { alert("Please select at least one category"); return; }

        const phone = document.getElementById('staffPhone').value;
        const staffData = {
            name: document.getElementById('staffName').value,
            phone: phone,
            nid: document.getElementById('staffNID').value,
            password: document.getElementById('staffPass').value,
            categories: selectedCats,
            hourlyRate: document.getElementById('hourlyRate').value,
            experience: document.getElementById('experience').value,
            skills: document.getElementById('keySkills').value,
            education: document.getElementById('education').value,
            cvLink: document.getElementById('cvLink').value,
            status: "pending", 
            rating: 5.0,
            isLive: false,
            joinedDate: new Date().toISOString()
        };

        db.ref('gorun_staffs/' + phone).set(staffData).then(() => {
            document.getElementById('regMain').innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <i class="fa-solid fa-clock-rotate-left" style="font-size: 70px; color: #f59e0b; margin-bottom: 25px;"></i>
                    <h2 style="color: var(--dark-blue);">Registration Submitted!</h2>
                    <p style="color: #64748b; margin: 15px 0; font-size: 16px;">Your profile is under review. You'll be notified once the Admin approves your account.</p>
                    <button onclick="window.location.href='../index.html'" style="background: var(--gorun-green); color: white; padding: 12px 30px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; margin-top: 10px;">Back to Login</button>
                </div>`;
        }).catch(err => alert("Error: " + err.message));
    });
</script>

</body>
</html>
