<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Onboarding | GORUN</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .reg-container { background: white; width: 100%; max-width: 900px; padding: 50px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .header { text-align: center; margin-bottom: 35px; }
        .header img { width: 55px; margin-bottom: 10px; }
        .header h2 { color: var(--dark-blue); font-size: 28px; font-weight: 800; }
        .section-title { font-size: 13px; color: var(--gorun-green); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 15px; display: block; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--dark-blue); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: #fcfdfe; transition: 0.3s; }
        input:focus { border-color: var(--gorun-green); outline: none; }
        .file-upload { position: relative; border: 1.5px dashed #cbd5e1; padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; color: #64748b; }
        .file-upload input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
        .btn-submit { width: 100%; background: var(--gorun-green); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,143,81,0.2); }
    </style>
</head>
<body>

<div class="reg-container" id="regMain">
    <div class="header">
        <img src="../assets/img/logo.png" alt="GORUN">
        <h2>Expert Registration</h2>
        <p>Step 1: Complete Your Professional Profile</p>
    </div>

    <form id="staffRegForm">
        <span class="section-title">Personal Information</span>
        <div class="input-grid">
            <div class="input-group"><label>Full Name</label><input type="text" id="staffName" placeholder="e.g. Rakibul Hasan" required></div>
            <div class="input-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>
            <div class="input-group"><label>Mother's Name</label><input type="text" id="motherName" required></div>
            <div class="input-group"><label>Phone Number</label><input type="tel" id="staffPhone" placeholder="01XXXXXXXXX" required></div>
            <div class="input-group"><label>Password</label><input type="password" id="staffPass" required></div>
            <div class="input-group"><label>NID Number</label><input type="number" id="staffNID" required></div>
        </div>

        <span class="section-title">Address Details</span>
        <div class="input-grid">
            <div class="input-group"><label>Present Address</label><textarea id="presentAddress" rows="2" required></textarea></div>
            <div class="input-group"><label>Permanent Address</label><textarea id="permanentAddress" rows="2" required></textarea></div>
        </div>

        <span class="section-title">Professional Background</span>
        <div class="input-grid">
            <div class="input-group">
                <label>Target Expertise</label>
                <select id="expertise" required>
    <option value="">-- Select Your Expertise --</option>
    <option value="student_counselor">Student Counselor</option>
    <option value="visa_expert">Visa Documentation Expert</option>
    <option value="compliance_expert">Compliance (Study Abroad)</option>
    <option value="admission_specialist">University Admission Specialist</option>
    <option value="language_trainer">IELTS / English Trainer</option>
    
    <option value="software_dev">Software Developer</option>
    <option value="data_entry">Data Entry Operator</option>
    <option value="excel_expert">Excel & Data Analyst</option>
    <option value="it_support">IT Support Technician</option>
    <option value="graphics_designer">Graphics Designer</option>
    
    <option value="sales_marketing">Sales & Marketing</option>
    <option value="call_center">Call Centre Agent</option>
    <option value="digital_marketer">Digital Marketing Expert</option>
    <option value="social_media_manager">Social Media Manager</option>
    <option value="bde_partner_manager">Business Development (B2B)</option>
    
    <option value="office_admin">Office Administrator</option>
    <option value="accounts_payroll">Accounts & Payroll</option>
    <option value="hr_manager">HR Manager</option>
    <option value="field_officer">Logistics / Field Officer</option>
    <option value="content_writer">Content Writer / SOP Specialist</option>
</select>

            </div>
            <div class="input-group"><label>Years of Experience</label><input type="number" id="experience" placeholder="e.g. 3" required></div>
            <div class="input-group"><label>Previous Platform</label><input type="text" id="prevPlatform" placeholder="e.g. Upwork / Local Company"></div>
            <div class="input-group"><label>Current Platform</label><input type="text" id="currentPlatform" placeholder="Where you work now"></div>
        </div>

        <span class="section-title">Documents (PDF Only)</span>
        <div class="input-grid">
            <div class="input-group"><label>Your NID</label><div class="file-upload"><span id="l1">Click to Upload PDF</span><input type="file" id="pdfNid" accept=".pdf" onchange="document.getElementById('l1').innerText=this.files[0].name"></div></div>
            <div class="input-group"><label>Nominee NID</label><div class="file-upload"><span id="l2">Click to Upload PDF</span><input type="file" id="pdfNominee" accept=".pdf" onchange="document.getElementById('l2').innerText=this.files[0].name"></div></div>
            <div class="input-group"><label>Academic Certificate</label><div class="file-upload"><span id="l3">Click to Upload PDF</span><input type="file" id="pdfAcademic" accept=".pdf" onchange="document.getElementById('l3').innerText=this.files[0].name"></div></div>
            <div class="input-group"><label>Professional CV</label><div class="file-upload"><span id="l4">Click to Upload PDF</span><input type="file" id="pdfCv" accept=".pdf" onchange="document.getElementById('l4').innerText=this.files[0].name"></div></div>
        </div>

        <button type="submit" class="btn-submit">Submit & Start Assessment</button>
    </form>
</div>

<script src="../config.js"></script>
<script>
    document.getElementById('staffRegForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const phone = document.getElementById('staffPhone').value;
        const staffData = {
            name: document.getElementById('staffName').value,
            father: document.getElementById('fatherName').value,
            mother: document.getElementById('motherName').value,
            phone: phone,
            nid: document.getElementById('staffNID').value,
            password: document.getElementById('staffPass').value,
            address: {
                present: document.getElementById('presentAddress').value,
                permanent: document.getElementById('permanentAddress').value
            },
            expertise: document.getElementById('expertise').value,
            experience: document.getElementById('experience').value,
            background: {
                previous: document.getElementById('prevPlatform').value,
                current: document.getElementById('currentPlatform').value
            },
            status: "pending_review", // প্রাথমিক স্ট্যাটাস
            isVerified: false,
            onboardingStep: 1, // মানে রেজিস্ট্রেশন শেষ
            joinedDate: new Date().toISOString()
        };

        // ফায়ারবেসে ডাটা সেভ
        db.ref('gorun_staffs/' + phone).set(staffData).then(() => {
            // সফল হলে আমরা তাকে ইন্টারভিউ পেজে নিয়ে যাবো
            alert("Registration Step 1 Complete! Redirecting to Virtual Interview...");
            localStorage.setItem('currentStaffId', phone);
       window.location.href = "staff-interview.html?phone=" + phone + "&expertise=" + staffData.expertise;
        }).catch(err => alert("Error: " + err.message));
    });
</script>
</body>
        
</html>
