<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | GORUN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --light-bg: #f8fafc; --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); display: flex; }
        .sidebar { width: var(--sidebar-width); background: var(--dark-blue); height: 100vh; color: white; padding: 30px 20px; position: fixed; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; color: var(--gorun-green); margin-bottom: 40px; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background: rgba(0, 143, 81, 0.1); color: var(--gorun-green); }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; min-height: 100vh; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .switch-container { display: flex; align-items: center; gap: 10px; background: white; padding: 8px 15px; border-radius: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gorun-green); }
        input:checked + .slider:before { transform: translateX(22px); }
        .stats-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .wallet-card { background: linear-gradient(135deg, var(--gorun-green), #007a45); color: white; padding: 25px; border-radius: 20px; }
        .balance { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .btn-withdraw { background: white; color: var(--gorun-green); border: none; padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .card-title { font-size: 18px; font-weight: 700; margin-top: 25px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .task-list { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; cursor: pointer; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 400px; margin: 10px auto; border-radius: 15px; overflow: hidden; border: 2px solid var(--gorun-green); }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .logo { display: none; } .main-content { margin-left: 70px; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">GORUN</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="showSection('dashboard', this)"><i class="fas fa-th-large"></i> <span>Dashboard</span></li>
            <li class="nav-item" onclick="showSection('jobs', this)"><i class="fas fa-briefcase"></i> <span>Job Requests</span></li>
            <li class="nav-item" onclick="showSection('history', this)"><i class="fas fa-history"></i> <span>Job History</span></li>
            <li class="nav-item" onclick="showSection('earnings', this)"><i class="fas fa-wallet"></i> <span>Earnings</span></li>
            <li class="nav-item" style="margin-top: 50px;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h2 id="display-name">Hello!</h2>
            <div class="switch-container">
                <span style="font-size: 14px; font-weight: 600;">Active Status</span>
                <label class="switch">
                    <input type="checkbox" id="status-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="dashboard-view">
            <div class="stats-grid">
                <div class="wallet-card">
                    <h4>Total Balance</h4>
                    <div class="balance" id="wallet-balance">৳ 0.00</div>
                    <button class="btn-withdraw"><i class="fas fa-money-bill-transfer"></i> Withdraw</button>
                </div>
                <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <p style="color: #64748b; font-size: 14px;">Tasks Completed</p>
                    <h3 id="tasks-count" style="font-size: 28px;">0</h3>
                    <hr style="margin: 10px 0; opacity: 0.1;">
                    <p style="color: #64748b; font-size: 14px;">Rating</p>
                    <h3 style="color: #f59e0b;"><i class="fas fa-star"></i> 4.9</h3>
                </div>
            </div>

            <div id="active-job-card-container" style="display: none;"> 
                <div id="reader" style="display: none;"></div>
                <div class="card-title"><i class="fas fa-play-circle" style="color: var(--gorun-green);"></i> Current Active Job</div>
                <div id="active-job-card" style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px;">
                    <div style="background: #dcfce7; color: #15803d; padding: 5px 15px; border-radius: 20px; font-size: 13px; display: inline-block; margin-bottom: 10px; font-weight: 600;">
                        <i class="fas fa-map-marker-alt"></i> At: <span id="job-location">Searching...</span>
                    </div>
                    <h1 id="timer-display" style="font-size: 48px; font-weight: 800; margin: 10px 0; color: var(--dark-blue);">00:00:00</h1>
                    <p id="shift-start-time" style="font-size: 14px; color: #64748b; margin-bottom: 20px;">Shift Started: --:--</p>
                    <button id="qr-action-btn" style="width: 100%; max-width: 300px; background: var(--gorun-green); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; display: inline-flex; justify-content: center; align-items: center; gap: 10px;">
                        <i class="fas fa-qrcode"></i> Scan QR to Check-out
                    </button>
                </div>
                <div class="card-title"><i class="fas fa-tasks" style="color: #3b82f6;"></i> Assigned Tasks</div>
                <div class="task-list" id="task-container"></div>
            </div>

            <div class="card-title"><i class="fas fa-bell" style="color: #f59e0b;"></i> New Job Requests</div>
            <div id="requests-container"></div>
        </div>

        <div id="table-display-container" style="margin-top: 30px; display: none;">
            <h3 id="table-title" style="margin-bottom: 15px;">Data Table</h3>
            <div id="data-table" style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAZ4On6mrMYp743OPavpxlsYUDrU-B7ozM",
            authDomain: "life-gps-2c6d1.firebaseapp.com",
            projectId: "life-gps-2c6d1",
            storageBucket: "life-gps-2c6d1.firebasestorage.app",
            messagingSenderId: "739534835153",
            appId: "1:739534835153:web:77e6b1f6650fba5d7624f0",
            measurementId: "G-TNBL8B9TFR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const currentStaffId = "staff_mobashir_01"; 
        let currentJobId = null;
        let html5QrCode;
        let timerInterval;

        // --- 1. Sidebar Logic ---
        function showSection(section, element) {
            const dashboard = document.getElementById('dashboard-view');
            const tableContainer = document.getElementById('table-display-container');
            const tableDiv = document.getElementById('data-table');
            const tableTitle = document.getElementById('table-title');

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            if (section === 'dashboard') {
                dashboard.style.display = 'block';
                tableContainer.style.display = 'none';
            } else {
                dashboard.style.display = 'none';
                tableContainer.style.display = 'block';
                tableTitle.innerText = section.charAt(0).toUpperCase() + section.slice(1);
                
                if (section === 'jobs') {
                    tableDiv.innerHTML = `<table style="width: 100%; border-collapse: collapse;"><thead><tr style="text-align: left; border-bottom: 2px solid #f1f5f9;"><th style="padding: 10px;">Location</th><th style="padding: 10px;">Rate</th><th style="padding: 10px;">Action</th></tr></thead><tbody id="jobs-table-body"><tr><td colspan="3" style="padding:10px;">Loading...</td></tr></tbody></table>`;
                    loadJobsTable();
                } else {
                    tableDiv.innerHTML = `<p style="padding:20px; color:#64748b;">No ${section} records found.</p>`;
                }
            }
        }

        // --- 2. Data Loading & Sync ---
        function syncWallet() {
            db.collection("staffs").doc(currentStaffId).onSnapshot((doc) => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('wallet-balance').innerText = `৳ ${(data.balance || 0).toLocaleString()}`;
                    document.getElementById('display-name').innerText = `Hello, ${data.name || 'Mobashir'}!`;
                    document.getElementById('tasks-count').innerText = data.tasksCompleted || 0;
                }
            });
        }

        function trackActiveJob() {
            db.collection("jobs").where("assignedStaff", "==", currentStaffId).where("status", "==", "ongoing").onSnapshot((querySnapshot) => {
                const container = document.getElementById('active-job-card-container');
                if (!querySnapshot.empty) {
                    const doc = querySnapshot.docs[0];
                    currentJobId = doc.id;
                    const data = doc.data();
                    container.style.display = 'block';
                    document.getElementById('job-location').innerText = data.location || "N/A";
                    if(data.startTime) startLiveTimer(data.startTime.toDate());
                    renderTasks(data.tasks || []);
                } else {
                    container.style.display = 'none';
                    if(timerInterval) clearInterval(timerInterval);
                }
            });
        }

        function loadJobRequests() {
            const requestsContainer = document.getElementById('requests-container');
            db.collection("jobs").where("status", "==", "open").onSnapshot((querySnapshot) => {
                requestsContainer.innerHTML = querySnapshot.empty ? '<p style="color: #94a3b8; padding: 20px;">No new requests found.</p>' : '';
                querySnapshot.forEach((doc) => {
                    const job = doc.data();
                    const jobDiv = document.createElement('div');
                    jobDiv.style = "background: white; padding: 20px; border-radius: 15px; border-left: 5px solid var(--gorun-green); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02);";
                    jobDiv.innerHTML = `<div><h5 style="font-weight:700;">${job.location}</h5><p style="font-size:12px; color:#64748b;">Rate: ৳${job.rate || '200'}/hr</p></div><button style="background: var(--gorun-green); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 600; cursor: pointer;" onclick="acceptJob('${doc.id}')">Accept</button>`;
                    requestsContainer.appendChild(jobDiv);
                });
            });
        }

        // --- 3. Actions ---
        window.acceptJob = function(jobId) {
            db.collection("jobs").doc(jobId).update({
                assignedStaff: currentStaffId,
                status: "ongoing",
                startTime: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => alert("Job Accepted!")).catch(err => alert("Error: " + err.message));
        };

        function renderTasks(tasks) {
            const taskContainer = document.getElementById('task-container');
            taskContainer.innerHTML = '';
            tasks.forEach((task, index) => {
                const taskItem = document.createElement('label');
                taskItem.className = 'task-item';
                taskItem.innerHTML = `<input type="checkbox" ${task.completed ? 'checked' : ''} onchange="updateTaskStatus(${index}, this.checked)"><span style="${task.completed ? 'text-decoration: line-through; color: #94a3b8;' : ''}">${task.title}</span>`;
                taskContainer.appendChild(taskItem);
            });
        }

        function updateTaskStatus(index, isCompleted) {
            if(!currentJobId) return;
            db.collection("jobs").doc(currentJobId).get().then(doc => {
                let tasks = doc.data().tasks;
                tasks[index].completed = isCompleted;
                db.collection("jobs").doc(currentJobId).update({ tasks: tasks });
            });
        }

        function startLiveTimer(startTime) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = new Date() - startTime;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        // --- 4. QR Scanner & Check-out ---
        function openScanner() {
            const readerElement = document.getElementById('reader');
            readerElement.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } }, 
                (decodedText) => {
                    alert("QR Scanned!");
                    processCheckOut(decodedText);
                    stopScanner();
                }
            ).catch(err => alert("Camera Error: " + err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                });
            }
        }

        function processCheckOut(qrData) {
            if(!currentJobId) return;
            db.collection("jobs").doc(currentJobId).update({
                status: "completed",
                endTime: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("Check-out Successful!");
                location.reload();
            });
        }

        document.getElementById('qr-action-btn').onclick = openScanner;

        window.onload = function() {
            syncWallet();
            trackActiveJob();
            loadJobRequests();
        };
    </script>
</body>
</html>
