<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration | GORUN</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gorun-green: #008f51; --dark-blue: #0f172a; --light-bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--light-bg); display: flex; justify-content: center; align-items: center; padding: 40px 20px; min-height: 100vh; }
        .reg-container { background: white; width: 100%; max-width: 750px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: var(--dark-blue); font-size: 28px; }
        .header p { color: #64748b; margin-top: 5px; }

        .form-section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px dashed #e2e8f0; }
        .section-title { font-size: 14px; color: var(--gorun-green); font-weight: 700; text-transform: uppercase; margin-bottom: 15px; display: block; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 10px;
            font-size: 14px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--gorun-green); box-shadow: 0 0 0 3px rgba(0,143,81,0.1); }

        /* Category Grid CSS (এটি মিসিং ছিল) */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
        }
        .check-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            transition: 0.3s;
        }
        .check-item:hover { border-color: var(--gorun-green); background: #f0fff4; }
        .check-item input { width: auto; margin-right: 12px; accent-color: var(--gorun-green); }
        .check-item span { font-size: 14px; color: var(--dark-blue); font-weight: 500; }

        .btn-submit {
            width: 100%; background: var(--gorun-green); color: white; padding: 15px;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-submit:hover { background: #007a45; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="reg-container" id="regMain">
    <div class="header">
        <img src="../assets/img/logo.png" alt="GORUN" style="width: 60px; margin-bottom: 10px;">
        <h2>Staff Onboarding</h2>
        <p>Become a Qualified GORUN Expert</p>
    </div>

    <form id="staffRegForm">
        <div class="form-section">
            <span class="section-title">Personal Details</span>
            <div class="input-grid">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="staffName" placeholder="e.g. Mr. Mobashir" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="staffPhone" placeholder="017XXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>NID Number</label>
                    <input type="number" id="staffNID" placeholder="National ID Number" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="staffPass" placeholder="Set a password" required>
                </div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">Professional Expertise</span>
            <div class="input-group" style="grid-column: 1 / -1;">
                <label>Work Categories (Select all that apply)</label>
                <div class="category-grid">
                    <label class="check-item"><input type="checkbox" name="workCat" value="Corporate"> <span>Corporate</span></label>
                    <label class="check-item"><input type="checkbox" name="workCat" value="Medicine"> <span>Medicine</span></label>
                    <label class="check-item"><input type="checkbox" name="workCat" value="Groceries"> <span>Groceries</span></label>
                    <label class="check-item"><input type="checkbox" name="workCat" value="Food"> <span>Food & Service</span></label>
                    <label class="check-item"><input
