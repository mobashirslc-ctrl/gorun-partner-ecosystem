<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | GORUN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gorun-green: #008f51; 
            --dark-blue: #0f172a; 
            --light-bg: #f8fafc;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); display: flex; }

        /* Sidebar Style */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark-blue);
            height: 100vh;
            color: white;
            padding: 30px 20px;
            position: fixed;
            transition: 0.3s;
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--gorun-green); margin-bottom: 40px; }
        
        .nav-menu { list-style: none; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 143, 81, 0.1); color: var(--gorun-green); }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; }

        /* Top Header & Toggle */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .switch-container { display: flex; align-items: center; gap: 10px; background: white; padding: 8px 15px; border-radius: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gorun-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Wallet & Stats Card */
        .stats-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .wallet-card { background: linear-gradient(135deg, var(--gorun-green), #007a45); color: white; padding: 25px; border-radius: 20px; position: relative; overflow: hidden; }
        .wallet-card h4 { font-size: 14px; opacity: 0.9; }
        .balance { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .btn-withdraw { background: white; color: var(--gorun-green); border: none; padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-withdraw:hover { transform: scale(1.05); }

        /* New Job Requests */
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .job-request { background: white; padding: 20px; border-radius: 15px; border-left: 5px solid var(--gorun-green); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .job-info h5 { font-size: 16px; margin-bottom: 5px; }
        .job-info p { font-size: 13px; color: #64748b; }
        .btn-accept { background: var(--gorun-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar .nav-item span, .logo { display: none; }
            .main-content { margin-left: 70px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">GORUN</div>
        <ul class="nav-menu">
            <li class="nav-item active"><i class="fas fa-th-large"></i> <span>Dashboard</span></li>
            <li class="nav-item"><i class="fas fa-briefcase"></i> <span>Job Requests</span></li>
            <li class="nav-item"><i class="fas fa-history"></i> <span>Job History</span></li>
            <li class="nav-item"><i class="fas fa-wallet"></i> <span>Earnings</span></li>
            <li class="nav-item" style="margin-top: 50px;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h2>Hello, Mobashir!</h2>
            <div class="switch-container">
                <span style="font-size: 14px; font-weight: 600;">Active Status</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="stats-grid">
            <div class="wallet-card">
                <h4>Total Balance</h4>
                <div class="balance">৳ 4,520.00</div>
                <button class="btn-withdraw"><i class="fas fa-money-bill-transfer"></i> Withdraw</button>
            </div>
            
            <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <p style="color: #64748b; font-size: 14px;">Tasks Completed</p>
                <h3 style="font-size: 28px;">24</h3>
                <hr style="margin: 10px 0; opacity: 0.1;">
                <p style="color: #64748b; font-size: 14px;">Rating</p>
                <h3 style="color: #f59e0b;"><i class="fas fa-star"></i> 4.9</h3>
            </div>
        </div>

        <div class="card-title"><i class="fas fa-bell" style="color: #f59e0b;"></i> New Job Requests</div>
        
        <div class="job-request">
            <div class="job-info">
                <h5>Corporate Event Support</h5>
                <p><i class="fas fa-map-marker-alt"></i> Banani, Dhaka • <i class="fas fa-clock"></i> 4 Hours • <b>৳200/hr</b></p>
            </div>
            <button class="btn-accept">Accept</button>
        </div>

        <div class="job-request" style="border-left-color: #3b82f6;">
            <div class="job-info">
                <h5>Data Entry - Urgent</h5>
                <p><i class="fas fa-map-marker-alt"></i> Gulshan 1 • <i class="fas fa-clock"></i> 6 Hours • <b>৳180/hr</b></p>
            </div>
            <button class="btn-accept" style="background: #3b82f6;">Accept</button>
        </div>

    </div>

</body>
</html>
