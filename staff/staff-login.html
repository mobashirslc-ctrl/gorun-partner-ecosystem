<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login | GORUN</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #008f51; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .back-link { display: block; margin-top: 15px; font-size: 13px; color: #008f51; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #0f172a;">Expert Login</h2>
        <p style="font-size: 14px; color: #64748b;">Enter your credentials to access portal</p>
        
        <input type="tel" id="logPhone" placeholder="Phone Number (01xxxxxxxxx)">
        <input type="password" id="logPass" placeholder="Password">
        
        <button onclick="loginStaff()">Login</button>
        <a href="register.html" class="back-link">Don't have an account? Register</a>
    </div>

        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="../config.js"></script>
    <script>
    async function loginStaff() {
        // বাটন এলিমেন্ট ধরছি যাতে ইউজার বুঝুক কাজ হচ্ছে
        const loginBtn = document.querySelector('button');
        const phone = document.getElementById('logPhone').value;
        const pass = document.getElementById('logPass').value;

        if(!phone || !pass) {
            alert("Please enter phone and password!");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerText = "Checking...";

        try {
            // সরাসরি Firebase Realtime Database থেকে চেক
            const snapshot = await firebase.database().ref('gorun_staffs/' + phone).get();
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                
                if (userData.password === pass) {
    localStorage.setItem('currentStaffId', phone);
    const status = userData.status || "registered";
    const expertise = userData.expertise;
    const mockLink = userData.mock_link; 

    // ১. অ্যাডমিন লিঙ্ক দিলে বা শিডিউল হলে মক টেস্টে যাবে
    if (mockLink || status === "mock_scheduled") {
        window.location.href = `mock-test.html?phone=${phone}`;
    } 
    // ২. নতুন ইউজার হলে পরীক্ষায় যাবে
    else if (status === "registered" || status === "pending") {
        window.location.href = `staff-interview.html?phone=${phone}&expertise=${expertise}`;
    } 
    // ৩. পরীক্ষা শেষ হলে সরাসরি মক টেস্টের ওয়েটিং রুমে যাবে (এটাই আপনার সমস্যার সমাধান)
    else if (status === "exam_completed") {
        window.location.href = `mock-test.html?phone=${phone}`; 
    }
    // ৪. মক ইন্টারভিউ পুরোপুরি শেষ হয়ে গেলে তখন পেন্ডিং দেখাবে
    else if (status === "mock_completed" || status === "pending_review") {
        window.location.href = "pending.html"; 
    }
    // ৫. ভেরিফাইড হলে ড্যাশবোর্ড
    else if (status === "verified") {
        window.location.href = `dashboard.html?phone=${phone}`;
    }
    else {
        window.location.href = "pending.html";
    }
}
                } else {
                    alert("Incorrect Password!");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Login";
                }
            } else {
                alert("User not found! Please register first.");
                loginBtn.disabled = false;
                loginBtn.innerText = "Login";
            }
        } catch (error) {
            console.error(error);
            alert("Connection Error! Please check your config.js and internet.");
            loginBtn.disabled = false;
            loginBtn.innerText = "Login";
        }
    }
</script>



</body>
</html>
