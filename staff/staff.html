<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | GORUN</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #008f51; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p id="msg">Verifying session...</p>
    </div>

    <script>
        // আপনার সঠিক Firebase Config এখানে দিন
        const firebaseConfig = {
            apiKey: "AIzaSyAZ4On6mrMYp743OPavpxlsYUDrU-B7ozM",
            authDomain: "life-gps-2c6d1.firebaseapp.com",
            projectId: "life-gps-2c6d1",
            storageBucket: "life-gps-2c6d1.firebasestorage.app",
            messagingSenderId: "739534835153",
            appId: "1:739534835153:web:77e6b1f6650fba5d7624f0"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();

            const staffPhone = localStorage.getItem('currentStaffId');

            if (!staffPhone) {
                // আইডি না থাকলে রেজিস্ট্রেশনে পাঠাবে
                window.location.href = "register.html";
            } else {
                // ডাটাবেস চেক (Note: আপনার কালেকশন নাম 'staffs' না 'gorun_staffs' তা চেক করে নিন)
                db.collection("staffs").doc(staffPhone).get().then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        const status = data.onboarding_status || data.status;

                        if (status === "pending_review") {
                            window.location.href = `staff-interview.html?phone=${staffPhone}&expertise=${data.expertise}`;
                        } else {
                            window.location.href = "staff-dashboard.html";
                        }
                    } else {
                        // ডাটাবেসে না থাকলে রেজিস্ট্রেশনে পাঠাবে
                        localStorage.removeItem('currentStaffId');
                        window.location.href = "register.html";
                    }
                }).catch(err => {
                    document.getElementById('msg').innerText = "Database Error: " + err.message;
                });
            }
        } catch (e) {
            document.getElementById('msg').innerText = "Config Error: " + e.message;
        }
    </script>
</body>
</html>
